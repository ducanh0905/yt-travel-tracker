<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thống kê dữ liệu Youtube Du Lịch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div>
      <span>GATE · TRAVEL CONTENT</span>
      <h1>Thống kê dữ liệu Youtube Du Lịch</h1>
    </div>
    <!-- Container chứa các khối đếm số liệu -->
    <div class="stats-container" id="statsHeader">
      <div class="stat-card">
        <div class="label">Kênh</div>
        <div class="value" id="countChannels">–</div>
      </div>
      <div class="stat-card">
        <div class="label">Video</div>
        <div class="value" id="countVideos">–</div>
      </div>
      <div class="stat-card">
        <div class="label">Cập nhật</div>
        <div class="value" id="lastUpdated">–</div>
      </div>
    </div>
  </header>

  <main>
    <div class="controls-panel">
      <label for="sortSelect">Sắp xếp theo:</label>
      <select id="sortSelect">
        <option value="publishedAt">Ngày đăng mới nhất</option>
        <option value="viewCount">Lượt xem nhiều nhất</option>
        <option value="likeCount">Lượt thích nhiều nhất</option>
        <option value="commentCount">Bình luận nhiều nhất</option>
        <option value="subscriberCount">Sub kênh cao nhất</option>
      </select>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Video</th>
            <th>Kênh</th>
            <th>Ngày đăng</th>
            <th>Lượt xem</th>
            <th>Thích</th>
            <th>Bình luận</th>
            <th>Sub kênh</th>
          </tr>
        </thead>
        <tbody id="videoTableBody">
          <tr>
            <td colspan="7" style="text-align: center; color: var(--text-muted);">Đang tải dữ liệu hệ thống...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Lớp phủ Sidebar cấu trúc mới mượt mà -->
  <div class="sidebar-overlay" id="sidebarOverlay">
    <div class="detail-sidebar">
      <div class="sidebar-header">
        <div id="sidebarChannelBadge"></div>
        <button class="close-btn" id="closeSidebarBtn">&times;</button>
      </div>
      <div class="sidebar-content" id="sidebarContent">
        <!-- JS sẽ đẩy nội dung mượt mà vào đây -->
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
